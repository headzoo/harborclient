name: CI

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: harborclient
          MYSQL_DATABASE: harborclient_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pharborclient"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: harborclient
          POSTGRES_DB: harborclient_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Set up JDK 21 for Firebase emulators
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Reject local SDK link override
        run: |
          if grep -qF 'link:../harborclient-sdk' package.json pnpm-lock.yaml; then
            echo "::error::package.json or pnpm-lock.yaml contains a local @harborclient/sdk link override (link:../harborclient-sdk). Remove it before pushing."
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck

      - name: Test
        env:
          HARBOR_TEST_MYSQL_HOST: 127.0.0.1
          HARBOR_TEST_MYSQL_PORT: 3306
          HARBOR_TEST_MYSQL_USER: root
          HARBOR_TEST_MYSQL_PASSWORD: harborclient
          HARBOR_TEST_MYSQL_DATABASE: harborclient_test
          HARBOR_TEST_POSTGRES_HOST: 127.0.0.1
          HARBOR_TEST_POSTGRES_PORT: 5432
          HARBOR_TEST_POSTGRES_USER: postgres
          HARBOR_TEST_POSTGRES_PASSWORD: harborclient
          HARBOR_TEST_POSTGRES_DATABASE: harborclient_test
        run: >-
          pnpm exec firebase emulators:exec
          --only auth,firestore
          --project demo-harborclient-test
          "node scripts/test-with-native.mjs"
