appId: com.harborclient
productName: HarborClient
artifactName: harborclient-${version}.${ext}
executableName: harborclient
icon: build/icons/512x512.png
extraResources:
  - from: build/icons/512x512.png
    to: icon.png
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - package.json
  - node_modules/better-sqlite3/**/*
asarUnpack:
  - node_modules/better-sqlite3/**/*
linux:
  icon: build/icons
  syncDesktopName: true
  target:
    - AppImage
    - deb
  category: Development
  maintainer: harbor@example.com
mac:
  artifactName: harborclient-${version}-${arch}.${ext}
  target:
    target: default
    arch:
      - arm64
      - x64
  type: distribution
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
win:
  signAndEditExecutable: false
  target:
    - nsis
publish:
  provider: github
  owner: headzoo
  repo: harborclient
  releaseType: release
